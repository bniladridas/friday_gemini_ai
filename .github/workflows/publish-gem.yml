---
name: Publish Gem to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.5.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Configure Bundler
        run: bundle config set frozen false

      - name: Install dependencies
        run: bundle install

      - name: Run tests
        run: bundle exec ruby tests/runner.rb
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  build:
    name: Build Gem
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result != 'failure' || inputs.skip_tests)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Configure Bundler
        run: bundle config set frozen false

      - name: Install dependencies
        run: bundle install

      - name: Build gem
        run: gem build *.gemspec

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem-package
          path: "*.gem"

      - name: Debug artifact info
        run: |
          echo "Artifact uploaded successfully"
          ls -la *.gem

  publish-github-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      contents: read
      packages: write

    steps:
      - name: Debug job status
        run: |
          echo "Publish job started"
          echo "Needs build result: ${{ needs.build.result }}"

      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: gem-package

      - name: Publish to GitHub Packages
        run: |
          echo "https://${GITHUB_TOKEN}:x-oauth-basic@rubygems.pkg.github.com/${{ github.repository_owner }}" > ~/.gem/credentials
          gem push *.gem --host https://rubygems.pkg.github.com/${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-rubygems:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    needs: build
    if: false  # Disabled - use manual workflow for RubyGems publishing

    steps:
      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: gem-package

      - name: Publish to RubyGems
        run: |
          gem push *.gem --host https://rubygems.org --key rubygems_api_key
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
